<!DOCTYPE html>
<html>
<head>
    <title>Assistente IA</title>

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Documentos</h2>

        <input type="file" id="fileInput" />
        <button onclick="uploadFile()">Upload</button>

        <div id="uploadStatus" class="status"></div>
        <div id="uploadSpinner" class="spinner hidden"></div>

        <hr>

        <button onclick="clearChat()">
            Novo Chat
        </button>

        <div class="small">
            RAG Local (offline)
        </div>

    </div>

    <!-- CHAT -->
    <div class="chat">

        <div
            id="chatBox"
            class="chat-box"
        ></div>

        <!-- typing indicator -->
        <div id="thinkingText" class="thinking hidden">
            Assistente a pensar...
        </div>
        
        <!-- INPUT -->
        <div class="input-bar">
        
            <textarea
                id="question"
                placeholder="Escreve a tua pergunta..."
                onkeydown="handleKey(event)"
            ></textarea>
        
            <button id="sendBtn" onclick="sendQuestion()">Enviar</button>
        
            <div id="thinkingSpinner" class="spinner hidden"></div>
        
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
